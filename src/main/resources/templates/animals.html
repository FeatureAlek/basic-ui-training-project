<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shelter Animals</title>
  <style>
    body { font-family: sans-serif; max-width: 860px; margin: 2rem auto; padding: 0 1rem; }
    h1 { border-bottom: 2px solid #333; padding-bottom: 0.4rem; }
    h2 { margin-top: 2rem; }
    ul { list-style: none; padding: 0; }
    li { border: 1px solid #ddd; border-radius: 6px; padding: 1rem; margin-bottom: 1rem; display: flex; gap: 1rem; align-items: flex-start; }
    li img { border-radius: 4px; }
    .info { flex: 1; }
    .status-available { color: green; font-weight: bold; }
    .status-adopted   { color: #999;  font-weight: bold; }
    form { display: grid; gap: 0.5rem; max-width: 480px; margin-top: 1rem; }
    label { font-weight: bold; }
    input, select, textarea { padding: 0.4rem; border: 1px solid #ccc; border-radius: 4px; width: 100%; box-sizing: border-box; }
    button { padding: 0.6rem 1.2rem; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; width: fit-content; }
    button:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <main>
    <h1>Shelter Animals</h1>

    <!-- ═══════════════════════════════════════════════════════════
         HARD-CODED LIST — replace with th:each in Task A
         ═══════════════════════════════════════════════════════════ -->
      <nav>
          <a th:href="@{/}">Home</a>
          <a th:href="@{/animals}">All animals</a>
          <a th:href="@{/animals/new}">Add animal</a>
      </nav>

    <section aria-label="Animal list">
        <ul>
            <li th:each="animal : ${animals}">
                <img th:src="${animal.imageUrl}" th:alt="'Photo of ' + ${animal.name}"
                     width="300" height="200" style="object-fit: cover;">
                <div class="info">
                    <strong th:text="${animal.name}">Luna</strong> —
                    <span th:text="${animal.type}">CAT</span> |
                    <span th:text="${animal.breed}">British Shorthair</span> |
                    Age: <span th:text="${animal.age}">2</span>

                    <span th:classappend="${animal.status.name() == 'AVAILABLE'} ? 'status-available' : 'status-adopted'"
                          th:text="${animal.status}">AVAILABLE</span>

                    <span th:if="${isAdmin and animal.status.name() == 'ADOPTED'}"
                          th:text="${animal.adoptionNote}"></span>

                    <p th:text="${animal.description}">Calm and affectionate.</p>

                    <form th:if="${isUser and animal.status.name() == 'AVAILABLE'}"
                          th:action="@{/api/animals/{id}/adopt(id=${animal.id})}" method="post">
                        <button type="submit">Adopt</button>
                    </form>
                </div>
            </li>
        </ul>
    </section>

      <!--
        POTENTIAL ISSUE NOT specified by the task
        FIX LATER
     -->
      <section aria-label="Add new animal"  th:if="${isAdmin}">
      <h2>Add a new animal</h2>
        <form th:action="@{/animals}" th:object="${form}" method="post">

            <label for="name">Name</label>
            <input id="name" th:field="*{name}" type="text" required placeholder="e.g. Milo">

            <label for="type">Type</label>
            <select id="type" th:field="*{type}">
                <option value="">— choose —</option>
                <option value="CAT">Cat</option>
                <option value="DOG">Dog</option>
                <option value="OTHER">Other</option>
            </select>

            <label for="breed">Breed</label>
            <input id="breed" th:field="*{breed}" type="text" placeholder="e.g. Siamese">

            <label for="age">Age (years)</label>
            <input id="age" th:field="*{age}" type="number" min="0" placeholder="e.g. 3">

            <label for="description">Description</label>
            <textarea id="description" th:field="*{description}" rows="3"></textarea>

            <label for="imageUrl">Image filename</label>
            <input id="imageUrl" th:field="*{imageUrl}" type="text" placeholder="luna.jpg">

            <button type="submit">Add animal</button>
        </form>
    </section>
  </main>
</body>
</html>
